services:
  db:
    image: postgres:18
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres-data:/var/lib/postgresql

    # Optional: Puts the db on the same host as the devcontainer, so one can
    # connect to the db using `localhost` instead of `db`
    #
    # network_mode: service:devcontainer

volumes:
  postgres-data:
