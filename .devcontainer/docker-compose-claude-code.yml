services:
  devcontainer:
    volumes:
      # Link user's claude config into this project for consistency across projects
      - ${HOME}/.claude:/home/vscode/.claude
      # We need a ~/.claude.json to avoid having to login within container,
      # but it gets corrupted, so mount and make a copy on postCreateCommand
      - ${HOME}/.claude.json:/home/vscode/.claude.json.host
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
