# Local development overrides for k3d
# Usage: make helm-install-local

server:
  baseURL: http://clawbake.127-0-0-1.nip.io:8080
  image:
    repository: clawbake-server
    tag: dev
    pullPolicy: Never

operator:
  image:
    repository: clawbake-operator
    tag: dev
    pullPolicy: Never

ingress:
  host: clawbake.127-0-0-1.nip.io

# Expose PostgreSQL as NodePort so the devcontainer can reach it
# via host.docker.internal:5432 (mapped by k3d --port flag)
database:
  internal:
    serviceType: NodePort
    nodePort: 30432

