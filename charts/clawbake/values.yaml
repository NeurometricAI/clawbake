global:
  namespace: clawbake

server:
  image:
    repository: ghcr.io/neurometric/clawbake-server
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env: {}

operator:
  image:
    repository: ghcr.io/neurometric/clawbake-operator
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

database:
  external: false
  url: ""
  internal:
    enabled: true
    image: postgres:18
    storage: 10Gi
    user: clawbake
    password: clawbake
    database: clawbake

auth:
  oidc:
    issuer: ""
    clientId: ""
    clientSecret: ""
    redirectUrl: ""
  sessionSecret: ""

slack:
  enabled: false
  botToken: ""
  signingSecret: ""

ingress:
  enabled: true
  className: ""
  host: clawbake.example.com
  tls: []

instanceDefaults:
  image: ghcr.io/openclaw/openclaw:latest
  domain: claw.example.com
  scheme: https
  port: ""
  cpuRequest: 100m
  memoryRequest: 1Gi
  cpuLimit: 500m
  memoryLimit: 2Gi
  storageSize: 5Gi
  allowInsecureControlUI: false
