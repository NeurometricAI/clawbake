global:
  namespace: clawbake

server:
  image:
    repository: ghcr.io/neurometricai/clawbake-server
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env: {}

operator:
  image:
    repository: ghcr.io/neurometricai/clawbake-operator
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

database:
  external: false
  url: ""
  internal:
    enabled: true
    image: postgres:18
    storage: 10Gi
    user: clawbake
    password: clawbake
    database: clawbake

auth:
  oidc:
    issuer: ""
    clientId: ""
    clientSecret: ""
    redirectUrl: ""
  sessionSecret: ""

slack:
  enabled: false
  botToken: ""
  signingSecret: ""

ingress:
  enabled: true
  className: ""
  host: clawbake.example.com
  annotations: {}
  tls: []

instanceDefaults:
  image: ghcr.io/openclaw/openclaw:latest
  cpuRequest: 500m
  memoryRequest: 1Gi
  cpuLimit: 2000m
  memoryLimit: 2Gi
  storageSize: 5Gi
  gatewayConfig: |
    {
      "gateway": {
        "controlUi": {
          "allowInsecureAuth": true,
          "dangerouslyDisableDeviceAuth": true,
          "dangerouslyAllowHostHeaderOriginFallback": true
        },
        "http": {
          "endpoints": {
            "chatCompletions": {
              "enabled": true
            }
          }
        }
      }
    }
  ttyd:
    enabled: true
    image: tsl0922/ttyd:alpine
    port: 7681
    command: "/ttyd-bin/ttyd -W -p 7681 node /app/openclaw.mjs tui --token $OPENCLAW_GATEWAY_TOKEN"
    cpuRequest: 50m
    memoryRequest: 64Mi
    cpuLimit: 200m
    memoryLimit: 256Mi
