apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawbake.fullname" . }}
  labels:
    {{- include "clawbake.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.database.external }}
  database-url: {{ .Values.database.url }}
  {{- else if .Values.database.internal.enabled }}
  database-url: "postgresql://{{ .Values.database.internal.user }}:{{ .Values.database.internal.password }}@{{ include "clawbake.fullname" . }}-postgresql:5432/{{ .Values.database.internal.database }}?sslmode=disable"
  {{- end }}
  oidc-issuer: {{ .Values.auth.oidc.issuer }}
  oidc-client-id: {{ .Values.auth.oidc.clientId }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret }}
  oidc-redirect-url: {{ .Values.auth.oidc.redirectUrl }}
  session-secret: {{ .Values.auth.sessionSecret }}
  {{- if .Values.slack.enabled }}
  slack-bot-token: {{ .Values.slack.botToken }}
  slack-signing-secret: {{ .Values.slack.signingSecret }}
  {{- end }}
