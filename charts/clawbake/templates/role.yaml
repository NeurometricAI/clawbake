apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "clawbake.fullname" . }}-server
  labels:
    {{- include "clawbake.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
rules:
  - apiGroups: ["clawbake.io"]
    resources: ["clawinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["clawbake.io"]
    resources: ["clawinstances/status"]
    verbs: ["get"]
