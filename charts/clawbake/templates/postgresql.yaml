{{- if and (not .Values.database.external) .Values.database.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawbake.fullname" . }}-postgresql
  labels:
    {{- include "clawbake.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: {{ .Values.database.internal.serviceType | default "ClusterIP" }}
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
      {{- if .Values.database.internal.nodePort }}
      nodePort: {{ .Values.database.internal.nodePort }}
      {{- end }}
  selector:
    {{- include "clawbake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clawbake.fullname" . }}-postgresql
  labels:
    {{- include "clawbake.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "clawbake.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "clawbake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "clawbake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.database.internal.image }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.internal.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.database.internal.password }}
            - name: POSTGRES_DB
              value: {{ .Values.database.internal.database }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.internal.user }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.internal.user }}
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.database.internal.storage }}
{{- end }}
