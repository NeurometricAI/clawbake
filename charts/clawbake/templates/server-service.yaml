apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawbake.fullname" . }}-server
  labels:
    {{- include "clawbake.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "clawbake.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
