apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawbake.fullname" . }}-operator
  labels:
    {{- include "clawbake.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "clawbake.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "clawbake.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "clawbake.fullname" . }}-operator
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - -leader-elect=true
          env:
            - name: INSTANCE_DEFAULT_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-default-image
            - name: DEFAULT_GATEWAY_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-gateway-config
            - name: INSTANCE_TTYD_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-enabled
            - name: INSTANCE_TTYD_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-image
            - name: INSTANCE_TTYD_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-port
            - name: INSTANCE_TTYD_COMMAND
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-command
            - name: INSTANCE_TTYD_CPU_REQUEST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-cpu-request
            - name: INSTANCE_TTYD_MEMORY_REQUEST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-memory-request
            - name: INSTANCE_TTYD_CPU_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-cpu-limit
            - name: INSTANCE_TTYD_MEMORY_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clawbake.fullname" . }}
                  key: instance-ttyd-memory-limit
            - name: SERVER_URL
              value: "http://{{ include "clawbake.fullname" . }}-server.{{ .Release.Namespace }}.svc.cluster.local"
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
