name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Setup envtest binaries
        id: envtest
        run: |
          ASSETS=$(setup-envtest use 1.35.0 -p path)
          echo "KUBEBUILDER_ASSETS=${ASSETS}" >> "$GITHUB_ENV"

      - name: Run code generation
        run: make generate

      - name: Verify no uncommitted generated code
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated code is out of date. Run 'make generate' and commit the changes."
            git diff --name-only
            exit 1
          fi

      - name: Run unit tests
        run: make test-unit

      - name: Build binaries
        run: make build
