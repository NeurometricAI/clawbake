name: Release

on:
  release:
    types: [published, prereleased]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.977

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Setup envtest binaries
        run: |
          ASSETS=$(setup-envtest use 1.35.0 -p path)
          echo "KUBEBUILDER_ASSETS=${ASSETS}" >> "$GITHUB_ENV"

      - name: Run code generation
        run: make generate

      - name: Verify no uncommitted generated code
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated code is out of date. Run 'make generate' and commit the changes."
            git diff --name-only
            exit 1
          fi

      - name: Run unit tests
        run: make test-unit

      - name: Build binaries
        run: make build

  docker:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [server, operator]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clawbake-${{ matrix.binary }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BINARY=${{ matrix.binary }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    needs: [test, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: "v4.1.1"

      - name: Update Chart.yaml version
        run: |
          yq -i '.version = "${{ steps.version.outputs.version }}"' charts/clawbake/Chart.yaml
          yq -i '.appVersion = "${{ steps.version.outputs.version }}"' charts/clawbake/Chart.yaml

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package charts/clawbake
          helm push clawbake-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
